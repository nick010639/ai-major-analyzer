    { id: "special-education", name: "特殊教育", category: "education", aiExposure: 3.0, radar: { automationRisk: 2, demandGrowth: 6, salaryPotential: 4, entryBarrier: 5, aiCollaboration: 5 }, replacing: ["个别化教育计划(IEP)模板生成", "行为数据记录与趋势分析", "辅助沟通板内容设计", "康复训练进度报告撰写"], notReplacing: ["对特殊儿童的耐心陪伴和情绪感知——机器没有共情", "根据个体差异即时调整教学策略"], demandTrend: "融合教育政策推进+自闭症等诊断率上升，需求持续增长。全国特教师资缺口大，尤其是有专业资质的。薪资比普教略高，编制相对好考。", directions: ["深耕自闭症谱系干预方向，考ABA相关认证", "学习AI辅助技术用于特殊儿童沟通和学习", "往融合教育资源教师方向发展，进入普通学校体系"], summary: "少数需求还在涨的教育类专业，入行门槛高反而保护了从业者——建议认真对待。" },
    { id: "educational-technology", name: "教育技术学", category: "education", aiExposure: 7.0, radar: { automationRisk: 6, demandGrowth: 5, salaryPotential: 5, entryBarrier: 4, aiCollaboration: 8 }, replacing: ["课件制作与多媒体素材加工", "在线课程平台搭建与维护", "教学数据采集与基础分析", "微课视频剪辑与字幕生成", "学习管理系统配置"], notReplacing: ["教学设计的底层逻辑——理解人怎么学", "技术与教育场景的深度适配判断"], demandTrend: "传统教育技术岗位被AI工具大面积替代，但AI+教育的交叉需求在爆发。关键是你得真懂技术，不能只会用PPT和录屏。", directions: ["全力转向AI+教育产品设计方向", "学Python和数据分析，做学习分析(Learning Analytics)", "进EdTech公司做教学设计师，而不是学校电教中心"], summary: "这个专业正在被AI重新定义——还停留在'教老师用电脑'的认知就废了，转向AI教育产品才有未来。" },

    // ===== 农学 =====
    { id: "agronomy", name: "农学", category: "agriculture", aiExposure: 5.0, radar: { automationRisk: 4, demandGrowth: 4, salaryPotential: 3, entryBarrier: 5, aiCollaboration: 6 }, replacing: ["病虫害图像识别与诊断", "气象数据分析与种植决策建议", "土壤检测报告解读", "产量预测模型计算"], notReplacing: ["田间实际操作与经验判断——土地的事得下地", "育种实验中的创造性设计与长周期观察"], demandTrend: "粮食安全是国家战略，科研院所和种业公司有稳定需求。但基层农技岗薪资低、条件苦，劝退率高。智慧农业方向是增长点但岗位还少。", directions: ["走分子育种+生物信息学方向，读研是必须的", "关注智慧农业和精准农业的技术岗", "考公进农业农村局或农科院体系"], summary: "国家需要但个人回报低，除非读研走育种科研路线，否则性价比不高。" },
    { id: "veterinary-medicine", name: "动物医学", category: "agriculture", aiExposure: 4.0, radar: { automationRisk: 3, demandGrowth: 6, salaryPotential: 5, entryBarrier: 6, aiCollaboration: 5 }, replacing: ["病例档案管理与用药记录", "影像初步筛查（X光/B超辅助判读）", "常见病症状问诊引导", "饲养管理方案生成"], notReplacing: ["手术操作和临床触诊——手上功夫是核心", "复杂病例的综合诊断与治疗决策"], demandTrend: "宠物经济爆发，宠物医生严重短缺，一线城市成熟兽医月薪可达2-3万。畜牧方向薪资低但稳定。学制长（5年），但回报周期值得。", directions: ["坚定走宠物临床方向，积累手术经验", "关注宠物专科化趋势（眼科/骨科/肿瘤）", "有条件的话考虑开自己的诊所"], summary: "宠物经济红利下少数高回报的农学专业，学制虽长但值得——前提是你真能吃苦熬住前几年。" },
    { id: "landscape-architecture", name: "园林", category: "agriculture", aiExposure: 5.5, radar: { automationRisk: 5, demandGrowth: 3, salaryPotential: 4, entryBarrier: 4, aiCollaboration: 6 }, replacing: ["效果图渲染与方案可视化", "植物配置方案自动生成", "CAD施工图基础绘制", "工程量清单与预算计算"], notReplacing: ["场地踏勘与空间感知——得亲自去现场", "与甲方沟通设计意图的反复博弈"], demandTrend: "房地产下行直接冲击园林行业，传统市政绑定的园林公司大面积裁员。生态修复和乡村振兴有政策支撑但预算紧。行业正在洗牌。", directions: ["转向生态修复和环境咨询方向", "学会用AI出图提升效率，降低对画图员岗位的依赖", "往文旅和乡村景观方向靠，跟政策走"], summary: "地产黄金时代结束后园林行业在阵痛期，短期不乐观，但生态方向有长期机会。" },
    { id: "food-science-engineering", name: "食品科学与工程", category: "engineering", aiExposure: 4.5, radar: { automationRisk: 4, demandGrowth: 5, salaryPotential: 4, entryBarrier: 4, aiCollaboration: 5 }, replacing: ["食品检测报告生成与数据录入", "配方优化的初步参数计算", "HACCP文档编写与合规检查", "营养标签计算"], notReplacing: ["感官评价和风味调配——人的味觉判断不可替代", "食品安全现场审核与工厂管理"], demandTrend: "刚需行业，就业面广但起薪低。新消费品牌和功能性食品有增长，质量安全岗位需求稳定。顶级食品企业(玛氏、雀巢等)薪资尚可。", directions: ["往功能性食品和合成生物学方向深耕", "考食品安全相关证书，走质量管理路线", "关注预制菜和新消费品牌的研发岗"], summary: "饿不死但发不了财的专业，想要高薪得进外企或走研发深耕路线。" },
    { id: "animal-science", name: "动物科学", category: "agriculture", aiExposure: 4.5, radar: { automationRisk: 4, demandGrowth: 4, salaryPotential: 4, entryBarrier: 4, aiCollaboration: 5 }, replacing: ["饲料配方计算与优化", "养殖环境数据监控与预警", "繁殖记录管理与遗传分析", "疫病风险预测模型"], notReplacing: ["大型养殖场的现场管理与应急处置", "动物行为的实地观察与福利评估"], demandTrend: "规模化养殖趋势下，大型牧业集团(牧原、温氏)持续招人，但工作环境在农场。饲料企业和动保企业是另一个出路。整体就业不难但生活质量是个问题。", directions: ["进大型牧业集团走管培生路线，晋升空间大", "往动物营养方向读研，进饲料企业研发部", "关注智慧牧业和精准养殖的技术岗位"], summary: "就业率其实不错，但大部分人接受不了养殖场的工作环境——想清楚再报。" },
    { id: "aquaculture", name: "水产养殖学", category: "agriculture", aiExposure: 4.0, radar: { automationRisk: 3, demandGrowth: 4, salaryPotential: 3, entryBarrier: 4, aiCollaboration: 5 }, replacing: ["水质参数监测与自动调控", "投喂量计算与饲料方案优化", "病害图像初筛与用药建议", "养殖数据记录与产量分析"], notReplacing: ["养殖现场的经验判断——水产的事极度依赖实践", "新品种引进和养殖模式创新"], demandTrend: "水产是中国优势产业，但从业意愿低导致人才缺口。沿海城市和水产大省(广东、山东、福建)需求集中。工作条件艰苦是最大劝退因素。", directions: ["走水产种苗和繁殖技术方向，技术壁垒高", "关注工厂化循环水养殖(RAS)方向", "学水产品加工和贸易，往产业链下游走"], summary: "冷门但不缺工作，问题是大部分人不愿意去塘边——如果你能接受，竞争反而小。" },

    { id: "history", name: "历史学", category: "history", aiExposure: 5.5, radar: { automationRisk: 5, demandGrowth: 2, salaryPotential: 3, entryBarrier: 3, aiCollaboration: 6 }, replacing: ["史料检索与文献综述生成", "历史事件时间线整理与可视化", "古文翻译与注释初稿", "考古报告数据录入与分类"], notReplacing: ["历史叙事的价值判断和观点输出——AI没有史观", "田野考古和文物鉴定的实物经验"], demandTrend: "纯历史学就业面极窄，主要出路是考公、教师、博物馆。文博文旅融合是新方向但岗位有限。AI能力在文献处理上已经很强了。", directions: ["考公是最现实的路径，历史学考公有优势", "往数字人文方向转，学数据可视化", "做历史类自媒体内容创作，市场有需求"], summary: "就业很难但考公有优势——如果不打算考公或读博，慎选。" },

    // ===== 工学（续） =====
    { id: "environmental-engineering", name: "环境工程", category: "engineering", aiExposure: 5.0, radar: { automationRisk: 4, demandGrowth: 4, salaryPotential: 4, entryBarrier: 5, aiCollaboration: 6 }, replacing: ["环评报告模板化内容生成", "污染物监测数据分析与报表", "工艺参数优化计算", "环保法规合规性检查"], notReplacing: ["污染现场调查与工程方案设计——得去现场", "与政府部门的环保审批沟通协调"], demandTrend: "环保督察常态化保证了基本需求，但行业利润薄、甲方多是政府项目回款慢。碳中和相关方向是增长点。环评市场被AI冲击明显。", directions: ["转向碳交易和碳核算方向，考碳排放管理师", "往环保设备和工程项目管理方向走", "学环境数据分析，做环境监测的智能化"], summary: "传统环评岗正在被AI替代，要么往碳方向转，要么做工程落地，别停在写报告层面。" },
    { id: "materials-science", name: "材料科学与工程", category: "engineering", aiExposure: 5.5, radar: { automationRisk: 4, demandGrowth: 5, salaryPotential: 5, entryBarrier: 6, aiCollaboration: 7 }, replacing: ["材料性能数据库检索与对比", "实验数据拟合与建模", "文献综述与研究趋势分析", "材料成分配比初步优化"], notReplacing: ["新材料的创造性设计思路——灵感不能计算", "实验室的实际操作与异常处理"], demandTrend: "半导体材料、新能源材料(锂电/钙钛矿)需求旺盛，传统金属和高分子方向一般。读研是基本要求，本科就业面窄。AI在材料计算领域渗透快。", directions: ["瞄准半导体材料或新能源材料方向读研", "学材料计算和机器学习辅助材料设计", "进新能源头部企业(宁德时代、比亚迪)的材料研发部"], summary: "方向选对了前景很好，选错了就是天坑——半导体和新能源材料是正确答案，传统方向别碰。" },
    { id: "surveying-mapping", name: "测绘工程", category: "engineering", aiExposure: 6.0, radar: { automationRisk: 6, demandGrowth: 3, salaryPotential: 4, entryBarrier: 5, aiCollaboration: 6 }, replacing: ["遥感影像自动解译与分类", "GIS数据处理与地图制作", "点云数据自动化处理", "测量数据平差计算"], notReplacing: ["复杂地形的现场测量作业", "测绘成果的质量审核与法律效力签章"], demandTrend: "传统测绘随基建放缓在萎缩，但无人机测绘、自动驾驶高精地图、卫星遥感是新增长点。AI对传统测绘内业岗冲击很大。", directions: ["转向无人机测绘和激光雷达数据处理", "学GIS开发，往空间数据分析方向走", "关注自动驾驶和智慧城市的高精地图岗位"], summary: "传统测绘在萎缩，但空间数据能力在自动驾驶和智慧城市领域值钱——关键是技能要升级。" },
    { id: "mining-engineering", name: "采矿工程", category: "engineering", aiExposure: 4.0, radar: { automationRisk: 4, demandGrowth: 2, salaryPotential: 5, entryBarrier: 5, aiCollaboration: 4 }, replacing: ["矿体建模与储量计算", "采矿方案的初步设计与优化", "安全监测数据分析与预警", "地质数据三维可视化"], notReplacing: ["井下现场安全管理——人命关天的事不能远程", "复杂地质条件下的工程决策"], demandTrend: "传统煤矿在收缩，但锂矿、稀土等新能源矿产有增长。智慧矿山是趋势但推进慢。行业薪资不低但工作环境和地点是硬伤。", directions: ["转向新能源矿产(锂、钴、镍)开发方向", "学智慧矿山和矿山自动化技术", "往矿业咨询和矿产投资分析方向走"], summary: "薪资其实不差，但你得愿意去矿山——新能源矿产方向是目前最好的出路。" },
    { id: "textile-engineering", name: "纺织工程", category: "engineering", aiExposure: 5.0, radar: { automationRisk: 5, demandGrowth: 2, salaryPotential: 3, entryBarrier: 3, aiCollaboration: 5 }, replacing: ["面料花型设计生成", "纺织工艺参数优化", "质检图像自动识别", "供应链订单排产计算"], notReplacing: ["面料手感和品质的人工鉴别", "纺织设备现场调试与故障排除"], demandTrend: "传统纺织产能过剩且在向东南亚转移。功能性纺织品(医用、军用、智能穿戴)和可持续时尚有增长，但岗位体量小。整体是夕阳方向。", directions: ["转向功能性纤维和智能纺织品研发", "学服装供应链管理，往品牌方走", "关注可持续时尚和环保材料方向"], summary: "传统纺织在中国已经是夕阳产业，除非做高端功能性方向，否则不建议报考。" },
    { id: "transportation", name: "交通运输", category: "engineering", aiExposure: 5.5, radar: { automationRisk: 5, demandGrowth: 4, salaryPotential: 5, entryBarrier: 5, aiCollaboration: 6 }, replacing: ["交通流量数据分析与预测", "运输路线优化与调度排程", "交通规划方案的仿真模拟", "事故数据统计与归因分析"], notReplacing: ["复杂交通枢纽的运营管理决策", "交通政策的社会影响评估与公众沟通"], demandTrend: "轨道交通和智能交通持续建设，国企(铁路局、地铁公司、高速集团)是主要去向，稳定但涨薪慢。自动驾驶对行业有长期结构性影响。", directions: ["往智能交通系统(ITS)方向发展", "进铁路局或地铁公司走稳定路线", "学交通大数据分析，往科技公司的出行业务靠"], summary: "就业靠国企兜底，稳定但无惊喜——想要高薪就往智能交通和自动驾驶方向转。" },
    { id: "aerospace-engineering", name: "航空航天工程", category: "engineering", aiExposure: 5.0, radar: { automationRisk: 3, demandGrowth: 7, salaryPotential: 7, entryBarrier: 8, aiCollaboration: 7 }, replacing: ["CFD仿真的前处理与后处理", "结构有限元分析的常规计算", "试验数据处理与报告生成", "零部件参数化设计"], notReplacing: ["航空器总体设计的系统性思维", "飞行试验和极端工况下的工程判断"], demandTrend: "军民融合+商业航天爆发，人才供不应求。航空航天院所(航天科技、中航工业)和商业航天公司(蓝箭、星际荣耀)都在抢人。门槛高但回报好。", directions: ["读研进航天院所走科研路线", "关注商业航天创业公司的工程岗", "学飞控或导航方向，通用性更强"], summary: "顶级工科专业，门槛高但前景好——中国航天正在黄金期，值得投入。" },
    { id: "naval-architecture", name: "船舶与海洋工程", category: "engineering", aiExposure: 5.0, radar: { automationRisk: 4, demandGrowth: 5, salaryPotential: 5, entryBarrier: 6, aiCollaboration: 6 }, replacing: ["船体结构有限元分析", "水动力性能仿真计算", "船舶设计图纸的参数化建模", "建造进度数据跟踪与报表"], notReplacing: ["船舶总体设计的工程经验与权衡", "船厂现场建造管理与质量控制"], demandTrend: "中国已是全球第一造船国，LNG船和大型集装箱船订单饱满。军舰建造也在加速。行业周期性强，当前处于上行期。", directions: ["专注LNG船和新能源船舶方向", "学海洋工程装备(深海平台/海上风电)", "进中船集团体系，稳定且有技术积累"], summary: "中国造船业全球第一不是吹的，现在是入行好时机——但行业有周期，做好心理准备。" },
    { id: "cyberspace-security", name: "网络空间安全", category: "engineering", aiExposure: 6.5, radar: { automationRisk: 4, demandGrowth: 8, salaryPotential: 7, entryBarrier: 7, aiCollaboration: 8 }, replacing: ["漏洞扫描与基础渗透测试", "安全日志分析与威胁告警", "恶意代码特征提取与分类", "合规审计检查清单执行"], notReplacing: ["高级持续性威胁(APT)的攻防对抗——攻防是人与人的博弈", "安全架构设计与企业安全策略制定"], demandTrend: "数据安全法+等保合规驱动需求爆发，各行业都在建安全团队。AI既是工具也制造了新的安全威胁，反而扩大了就业。", directions: ["深耕AI安全方向——这是未来最大增量", "考CISP/CISSP等认证提升市场价值", "往安全攻防(红队)方向走，技术天花板高"], summary: "少数AI越发展反而越需要人的专业——安全人才缺口还在扩大，值得投入。" },

    // ===== 理学（续） =====
    { id: "geography", name: "地理科学", category: "science", aiExposure: 5.0, radar: { automationRisk: 5, demandGrowth: 3, salaryPotential: 3, entryBarrier: 4, aiCollaboration: 6 }, replacing: ["地理信息数据处理与制图", "遥感影像解译", "气候数据统计分析", "区域规划基础数据整理"], notReplacing: ["野外考察与地理现象的实地观测", "区域发展政策的综合分析与判断"], demandTrend: "师范类地理教师需求稳定，非师范方向就业面很窄。GIS技术岗有需求但竞争激烈。考公可选自然资源局等部门。", directions: ["师范方向当地理老师是最稳路线", "学GIS和遥感技术，往技术岗转", "考公进自然资源或规划部门"], summary: "师范方向还行，非师范方向就业很受限——选这个专业基本就是奔着当老师去的。" },
    { id: "marine-science", name: "海洋科学", category: "science", aiExposure: 4.5, radar: { automationRisk: 4, demandGrowth: 5, salaryPotential: 4, entryBarrier: 5, aiCollaboration: 5 }, replacing: ["海洋监测数据处理与可视化", "海洋气象模型的参数调优", "海水样品检测数据分析", "海洋环境评价报告撰写"], notReplacing: ["出海调查和深潜采样作业", "海洋生态系统的跨学科综合研究"], demandTrend: "海洋强国战略推动下科研投入增加，但产业化岗位有限。主要去向是海洋局、研究所、海洋工程公司。地域限制明显，集中在沿海城市。", directions: ["读研做海洋资源开发或海洋环境方向", "学海洋遥感和数据分析拓宽技能", "关注深海采矿和海上风电的交叉岗位"], summary: "国家重视但就业面窄，基本得读研——喜欢大海是不够的，得能接受长期出海。" },
    { id: "psychology", name: "心理学", category: "science", aiExposure: 5.0, radar: { automationRisk: 4, demandGrowth: 6, salaryPotential: 5, entryBarrier: 5, aiCollaboration: 6 }, replacing: ["心理测评量表的自动评分", "咨询记录整理与初步分析", "心理健康科普内容生成", "用户行为数据的基础心理分析"], notReplacing: ["面对面心理咨询的共情和治疗关系——AI没有人格", "危机干预中的即时判断与情感支持"], demandTrend: "心理健康需求爆发但变现路径长。学校心理教师需求增长，企业EAP岗位增多。独立执业需要长期积累，入行初期收入低。", directions: ["读临床/咨询方向研究生，走专业咨询师路线", "进互联网公司做用户研究(UXR)——薪资高", "往组织心理学方向走，做人才测评和培训"], summary: "需求在涨但赚钱慢，用户研究是最快变现路径——纯做心理咨询得熬5年以上。" },
    { id: "astronomy", name: "天文学", category: "science", aiExposure: 6.0, radar: { automationRisk: 4, demandGrowth: 3, salaryPotential: 4, entryBarrier: 8, aiCollaboration: 7 }, replacing: ["天文图像自动处理与天体识别", "光谱数据批量分析与分类", "轨道计算与天体力学模拟", "巡天数据的海量筛选"], notReplacing: ["天文现象的理论解释和新假说提出", "望远镜观测策略制定与数据质量判断"], demandTrend: "中国天文投入在增加(FAST/CSST)，但岗位极少。全国每年需求可能就几十人。转行路径窄但数理基础好，转金融/数据科学有优势。", directions: ["读博走科研路线——这条路很窄但纯粹", "利用数理功底转数据科学或量化金融", "做天文科普自媒体或科学传播"], summary: "极小众的纯学术专业，除非真的热爱且接受低薪科研——数理基础强可以转行当退路。" },
    { id: "chemistry", name: "化学", category: "science", aiExposure: 5.5, radar: { automationRisk: 5, demandGrowth: 4, salaryPotential: 4, entryBarrier: 5, aiCollaboration: 7 }, replacing: ["文献检索与合成路线推荐", "分子性质预测与虚拟筛选", "实验数据处理与图表生成", "化合物结构解析辅助"], notReplacing: ["实验室的实际合成操作与异常处理", "新反应机理的发现与验证"], demandTrend: "纯化学就业面窄，但化工、制药、新材料、电池行业都需要化学背景。AI在药物发现和材料设计上加速明显。本科就业一般，读研后选择多。", directions: ["转向计算化学/AI制药方向，跟上趋势", "进新能源(电池/光伏)行业做材料研发", "读研选有机合成或分析化学，走制药CRO路线"], summary: "纯化学很难就业，但化学+X的交叉方向很多——关键是读研和选对应用方向。" },
    { id: "ecology", name: "生态学", category: "science", aiExposure: 4.0, radar: { automationRisk: 3, demandGrowth: 4, salaryPotential: 4, entryBarrier: 6, aiCollaboration: 4 }, replacing: ["物种识别和分类的图像AI辅助", "生态数据的统计分析和建模", "环境监测数据的自动采集和预警"], notReplacing: ["野外调查和生态系统的实地观察", "环境影响评价中的综合判断", "生态修复方案的设计和实施监督"], demandTrend: "双碳政策推动了环保行业需求，但基层环保岗位薪资低。碳交易和ESG方向是新增长点但体量有限。学术路径竞争激烈，需要读博。", directions: ["碳交易和ESG方向是目前最有前景的出路", "环境咨询和环评方向需求稳定，考环评工程师", "如果做学术，生态学+大数据分析能力是优势"], summary: "生态学受益于双碳政策但改变不了一个事实：环保行业在中国依然是'重要但不赚钱'的领域。" },
    { id: "atmospheric-science", name: "大气科学", category: "science", aiExposure: 5.5, radar: { automationRisk: 5, demandGrowth: 4, salaryPotential: 5, entryBarrier: 7, aiCollaboration: 6 }, replacing: ["天气预报模型的自动化运行和输出", "气象数据的清洗和统计分析", "常规气象服务报告的模板化生成"], notReplacing: ["极端天气事件的预判和预警决策", "气象灾害的应急响应和现场指挥", "气候模型的改进和新算法研发"], demandTrend: "气象局和相关事业单位是主要就业方向，编制有限但竞争不算激烈。AI天气预报(华为盘古气象)正在改变行业，懂AI的气象人才有增量需求。", directions: ["气象局+事业编是主流出路，稳定但收入一般", "AI气象方向是新增长点，学编程和机器学习", "航空气象和海洋气象是细分方向，需求小但竞争也小"], summary: "冷门到几乎不受AI就业冲击——不是因为AI做不了气象预测，而是因为这行本来就没多少人抢。" },

    // ===== 医学（续） =====
    { id: "preventive-medicine", name: "预防医学", category: "medicine", aiExposure: 5.0, radar: { automationRisk: 4, demandGrowth: 6, salaryPotential: 4, entryBarrier: 6, aiCollaboration: 6 }, replacing: ["流行病学数据统计分析", "疫情监测数据自动预警", "健康档案管理与人群筛查", "公共卫生报告起草"], notReplacing: ["现场流行病学调查——得去疫区", "公共卫生政策制定中的多方博弈"], demandTrend: "新冠后国家大幅扩充公卫体系，疾控中心编制增加。但薪资比临床低很多，社会地位也差一截。慢性病防控和健康管理是长期增长点。", directions: ["进疾控中心或卫健委体系，吃编制红利", "往流行病学和生物统计方向读研", "转健康管理和保险精算方向，薪资更高"], summary: "新冠后最大受益专业之一，编制岗扩招明显——图稳定的好选择，但别指望高薪。" },
    { id: "medical-imaging", name: "医学影像学", category: "medicine", aiExposure: 7.0, radar: { automationRisk: 7, demandGrowth: 4, salaryPotential: 5, entryBarrier: 6, aiCollaboration: 8 }, replacing: ["CT/MRI图像的初步筛查与标注", "影像报告标准化内容生成", "病灶测量与量化分析", "影像前后对比与变化追踪"], notReplacing: ["复杂病例的影像综合诊断——AI误诊的后果太严重", "介入放射学的手术操作"], demandTrend: "AI影像诊断产品已大量落地，初级阅片工作被替代是确定趋势。但资深影像科医生反而因为要监督AI而更重要。介入方向不受影响。", directions: ["往介入放射学方向发展，手术技能AI替代不了", "学会用AI工具提升效率而不是被替代", "关注AI影像产品公司的医学顾问岗位"], summary: "AI冲击最大的医学专业之一——纯读片的饭碗在缩，介入方向才是安全的。" },
    { id: "anesthesiology", name: "麻醉学", category: "medicine", aiExposure: 4.0, radar: { automationRisk: 3, demandGrowth: 7, salaryPotential: 6, entryBarrier: 7, aiCollaboration: 5 }, replacing: ["麻醉深度监测数据的自动分析", "术前评估问卷和风险评分计算", "药物剂量的初步计算建议", "麻醉记录单自动填写"], notReplacing: ["术中生命体征的实时判断和紧急处置——容错率为零", "困难气道的操作处理"], demandTrend: "麻醉医生全国缺口巨大(约30万)，舒适化医疗推动需求持续增长。工作强度大、风险高，但薪资在医生中属于中上。", directions: ["坚定走临床麻醉路线，缺口就是机会", "关注疼痛科方向，独立性更强", "往重症医学(ICU)方向发展，可选路径多"], summary: "严重供不应求的专业，就业完全不愁——缺点是压力大、夜班多，但回报配得上付出。" },
    { id: "medical-laboratory", name: "医学检验技术", category: "medicine", aiExposure: 6.5, radar: { automationRisk: 6, demandGrowth: 4, salaryPotential: 4, entryBarrier: 5, aiCollaboration: 6 }, replacing: ["常规检验项目的自动化操作", "检验报告自动生成与审核", "细胞形态学的AI辅助识别", "质控数据分析与异常标记"], notReplacing: ["复杂标本的人工复检与疑难判断", "新检验方法的开发与验证"], demandTrend: "检验自动化和AI辅助判读持续推进，常规岗位需求在缩。分子诊断(PCR/基因检测)和质谱检验方向在增长。第三方检验机构(金域/迪安)是主要雇主。", directions: ["往分子诊断和基因检测方向转——增量最大", "学质谱技术(LC-MS)，临床需求在爆发", "进IVD(体外诊断)企业做产品应用或研发"], summary: "常规检验岗被自动化蚕食是确定趋势——往分子诊断和质谱方向走才有增量。" },
    { id: "rehabilitation-therapy", name: "康复治疗学", category: "medicine", aiExposure: 3.5, radar: { automationRisk: 3, demandGrowth: 7, salaryPotential: 4, entryBarrier: 4, aiCollaboration: 5 }, replacing: ["康复评估量表的自动评分", "康复训练方案的模板生成", "治疗进度记录与数据追踪", "辅助器具适配参数计算"], notReplacing: ["手法治疗和一对一康复训练——必须有人在旁边", "患者心理支持和依从性管理"], demandTrend: "老龄化+运动康复意识提升，需求增长确定。但目前薪资偏低，社会认知度不够。三甲医院康复科和康复专科医院是主要去向。运动康复是新热点。", directions: ["往运动康复方向发展，服务运动员和健身人群", "考作业治疗师(OT)或言语治疗师(ST)，细分领域竞争小", "关注居家康复和社区康复的政策红利"], summary: "老龄化社会的刚需专业，需求增长确定——现在薪资低但长期看好，适合有耐心的人。" },

    // ===== 文学（续） =====
    { id: "japanese", name: "日语", category: "literature", aiExposure: 8.0, radar: { automationRisk: 8, demandGrowth: 3, salaryPotential: 5, entryBarrier: 5, aiCollaboration: 6 }, replacing: ["日常商务邮件和文档翻译", "字幕和本地化翻译", "日语教学中的语法讲解和纠错"], notReplacing: ["日企商务文化中的人际关系维护和谈判", "文学作品中的语境和美学翻译", "涉及日本政商关系的跨文化咨询"], demandTrend: "AI翻译质量已接近人工水平，纯翻译岗快速萎缩。日企在华业务缩减进一步压缩需求。少数高端同传和日本市场本地化运营岗仍有空间，但总量很小。", directions: ["别做纯翻译，往日本市场运营和跨境电商方向转", "考虑日语+技术的复合能力，做日企IT项目对接", "如果真爱日本文化，内容创作比翻译更有出路"], summary: "AI翻译把日语专业的核心卖点——翻译能力——彻底打成了通用工具。纯日语毕业生的处境比英语还难。" },
    { id: "communication", name: "传播学", category: "literature", aiExposure: 7.5, radar: { automationRisk: 7, demandGrowth: 5, salaryPotential: 5, entryBarrier: 4, aiCollaboration: 7 }, replacing: ["舆情监测报告的数据收集和初步分析", "新闻稿和通稿的模板化撰写", "社交媒体数据的基础统计分析"], notReplacing: ["危机公关中的策略判断和即时决策", "深度调查报道的选题判断和人脉运营", "品牌叙事的创意策划和情感共鸣设计"], demandTrend: "传统媒体岗位持续萎缩。新媒体运营岗位数量大但薪资天花板低，且AI内容工具正在压缩初级运营的价值。有策略思维和数据分析能力的传播人才仍有需求。", directions: ["学数据分析，做数据驱动的传播策略而非纯内容生产", "往品牌战略和危机公关方向走，这需要判断力不是产出量", "掌握AI内容工具，用一个人的产能做三个人的活"], summary: "传播学的'写稿'部分正被AI吃掉，但'策略'部分依然需要人——问题是大部分毕业生只会写稿。" },
    { id: "advertising", name: "广告学", category: "literature", aiExposure: 7.5, radar: { automationRisk: 7, demandGrowth: 4, salaryPotential: 5, entryBarrier: 4, aiCollaboration: 7 }, replacing: ["广告文案的批量生成和A/B测试版本", "广告投放数据的日常监控和报表", "素材的基础排版和尺寸适配"], notReplacing: ["品牌策略定位和消费者洞察", "大型整合营销活动的创意策划", "客户关系维护和提案演讲"], demandTrend: "效果广告越来越自动化，投放优化师正在被AI蚕食。品牌广告受经济下行影响预算缩减。整体就业不乐观，但顶尖创意人才始终稀缺。", directions: ["做创意策略而不是执行，AI能写一百条文案但不能决定方向", "学程序化广告和数据分析，理解AI投放系统的逻辑", "往内容营销和品牌咨询方向转型"], summary: "广告行业正在经历'中间层塌陷'——AI干掉了中等水平的执行，只有顶尖创意和底层技术两端有活路。" },
    { id: "new-media", name: "网络与新媒体", category: "literature", aiExposure: 7.0, radar: { automationRisk: 7, demandGrowth: 6, salaryPotential: 5, entryBarrier: 3, aiCollaboration: 8 }, replacing: ["日常推文和短视频脚本的批量生产", "数据报表和粉丝画像分析", "评论区管理和基础用户互动"], notReplacing: ["爆款内容的选题嗅觉和节奏把控", "人设打造和粉丝社群的情感运营", "跨平台内容策略和商业化路径设计"], demandTrend: "岗位数量多但门槛极低，AI工具让一个人能管五个账号，企业正在缩减新媒体团队规模。能做出爆款的人永远稀缺，但大部分人做的是流水线工作。", directions: ["别当内容流水线工人，要做内容策略师和操盘手", "深耕一个垂直领域，建立个人IP比打工更有前途", "学会用AI工具做到一人团队，效率就是你的壁垒"], summary: "这个专业的悖论：行业需求看似旺盛，但AI让入行门槛归零，'谁都能做'意味着'做了也不值钱'。" },
    { id: "french", name: "法语", category: "literature", aiExposure: 7.5, radar: { automationRisk: 8, demandGrowth: 3, salaryPotential: 5, entryBarrier: 6, aiCollaboration: 5 }, replacing: ["法语商务文件和技术文档翻译", "法语教学中的基础语法讲解", "法语新闻和资料的摘要整理"], notReplacing: ["法语区非洲的商务拓展和驻外管理", "涉及法律和外交的高端口译", "法语文学研究和跨文化学术交流"], demandTrend: "中国与法语区非洲合作是法语就业的主要增量，但AI翻译压缩了纯语言岗需求。驻外岗位有但条件艰苦、竞争者少。国内法语岗位非常有限。", directions: ["瞄准中非合作方向，学法语+国际贸易或工程管理", "往外交、国际组织方向考，法语是联合国工作语言", "如果不想驻外，法语的就业面极窄，慎重选择"], summary: "法语的价值越来越取决于你愿不愿意去非洲——不愿意的话，AI翻译正在让这个专业失去存在理由。" },
    { id: "german", name: "德语", category: "literature", aiExposure: 7.5, radar: { automationRisk: 8, demandGrowth: 3, salaryPotential: 5, entryBarrier: 6, aiCollaboration: 5 }, replacing: ["德语技术文档和商务信函翻译", "德语教学中的基础语法和词汇训练", "德语资料的检索和信息提取"], notReplacing: ["德企在华业务的本地化管理和文化协调", "涉及工业标准和法规的专业口译", "德国留学咨询和学术合作中的深度沟通"], demandTrend: "德企在华业务量收缩，汽车行业转型冲击了最大的德语就业方向。AI翻译进一步压缩需求。德国留学中介需求小幅存在但体量有限。", directions: ["德语+汽车/机械工程是传统优势方向，但要关注电动化转型", "考虑德国留学后在当地就业，比回国就业面更宽", "纯德语翻译基本没前途，必须加一个硬技能"], summary: "德企缩减在华业务+AI翻译双重夹击，德语正从'有用的小语种'变成'越来越窄的小众方向'。" },

    // ===== 法学（续） =====
    { id: "political-science", name: "政治学与行政学", category: "law", aiExposure: 5.0, radar: { automationRisk: 4, demandGrowth: 3, salaryPotential: 4, entryBarrier: 5, aiCollaboration: 4 }, replacing: ["政策文件的初稿撰写和格式整理", "公共舆情的基础数据收集和分析", "政策法规的比较研究和资料整理"], notReplacing: ["政治环境分析和政策走向的判断", "政府关系维护和政策游说", "基层治理中的矛盾调解和群众工作"], demandTrend: "主要就业方向是考公，体制内岗位稳定但增长极慢。学术路径竞争激烈。企业端的政府关系岗有需求但不看专业对口。整体就业面窄。", directions: ["这个专业本质上就是考公专业，全力准备公务员考试", "如果不考公，往政策咨询或智库方向走需要读研", "学数据分析增加就业竞争力，纯文科出路太窄"], summary: "政治学的出路基本就是考公——考上了稳定，考不上就尴尬。AI对这个方向冲击不大，但就业本来就难。" },
    { id: "social-work", name: "社会工作", category: "law", aiExposure: 3.5, radar: { automationRisk: 2, demandGrowth: 4, salaryPotential: 3, entryBarrier: 3, aiCollaboration: 3 }, replacing: ["社区服务数据的统计和报表", "政策信息的整理和宣传材料编写", "标准化问卷调查的分发和回收"], notReplacing: ["面对面的心理疏导和危机干预", "社区矛盾的实地调解和人际协调", "弱势群体的长期陪伴和个案管理"], demandTrend: "社会需求大但待遇极差，大部分岗位在社区和社会组织，月薪刚过温饱线。政策上在推社工体系建设但资金投入跟不上。AI冲击小但不是因为'重要'，而是因为'不值得自动化'。", directions: ["考社工证，往社区治理和民政系统方向考公", "如果不在乎收入、真心想做这行，做好长期低薪的心理准备", "转向心理咨询方向需要额外学习和认证"], summary: "AI替代不了社会工作者的面对面服务——但这个专业的真正问题不是AI，是钱太少。" },
    { id: "international-politics", name: "国际政治", category: "law", aiExposure: 5.5, radar: { automationRisk: 5, demandGrowth: 3, salaryPotential: 5, entryBarrier: 6, aiCollaboration: 5 }, replacing: ["国际新闻和政策的日常监测和摘要", "各国政策对比的基础资料整理", "外文资料翻译和信息提取"], notReplacing: ["地缘政治风险的综合判断和预测", "国际谈判中的策略设计和文化敏感度", "对外关系中的人脉网络建设"], demandTrend: "就业面极窄，主要出路是考公（外交部、商务部）、智库、国际组织，或转行做国际新闻。名校+硕士是基本门槛。", directions: ["目标明确就考外交部、商务部，但竞争极其激烈", "往国际商务和跨国企业政府事务方向转更实际", "语言能力是基本功，至少精通一门外语"], summary: "听起来高大上但就业面极窄——不是外交部就是失业，中间选项很少。" },
    { id: "ideological-political-edu", name: "思想政治教育", category: "law", aiExposure: 3.0, radar: { automationRisk: 2, demandGrowth: 4, salaryPotential: 4, entryBarrier: 4, aiCollaboration: 3 }, replacing: ["思政课程资料的整理和教案模板生成", "时政热点的信息搜集和简报制作", "标准化思政考核试题的生成"], notReplacing: ["课堂上的互动教学和价值引导", "学生心理辅导和思想动态把握", "党建和团建活动的组织和实施"], demandTrend: "政策刚需方向，所有高校和中学都必须配备思政教师。近年来思政教育地位提升，岗位需求稳定。但主要在体制内，薪资增长有限。", directions: ["考教师资格证，目标中学或高校思政教师岗位", "可以考辅导员岗位，高校辅导员需求持续存在", "考公务员也是核心出路，党务和宣传系统对口"], summary: "AI几乎动不了这个专业——不是因为技术壁垒高，而是因为这是政治任务，不可能让AI来做。" },

    // ===== 管理学（续） =====
    { id: "public-admin", name: "公共事业管理", category: "management", aiExposure: 4.5, radar: { automationRisk: 4, demandGrowth: 3, salaryPotential: 3, entryBarrier: 3, aiCollaboration: 4 }, replacing: ["公共服务数据的统计分析和报表", "政策执行的日常记录和文档管理", "通知、公告等行政文书的模板化撰写"], notReplacing: ["公共服务中的现场管理和应急协调", "社区和群众工作中的人际沟通", "公共项目的利益协调和资源分配"], demandTrend: "就业方向高度依赖考公和事业编，体制外几乎没有对口岗位。每年公务员考试竞争加剧，上岸率持续走低。专业名字好听但就业面极窄。", directions: ["核心出路是考公务员和事业编，认真准备考试", "体制外可以转向人力资源或行政管理岗位", "在校期间多考证（会计、人力资源等），拓宽就业面"], summary: "管理学中最尴尬的专业之一——学了'管理公共事业'，结果发现公共事业不归你管。出路就是考公。" },
    { id: "public-admin-mgmt", name: "行政管理", category: "management", aiExposure: 5.0, radar: { automationRisk: 5, demandGrowth: 3, salaryPotential: 4, entryBarrier: 3, aiCollaboration: 5 }, replacing: ["日常行政流程的审批和跟踪", "会议记录、工作总结等文档撰写", "办公用品采购和资产管理的登记"], notReplacing: ["跨部门协调和内部关系处理", "企业文化建设和团队管理", "高管助理的综合判断和优先级管理"], demandTrend: "企业行政岗正在被AI办公工具压缩，前台、文员、行政助理岗位在快速减少。高级行政总监有需求但不看专业对口。考公依然是最稳出路。", directions: ["考公是主线，行政管理是考公万金油专业", "企业端往人力资源或办公室主任方向发展", "学好办公软件和AI工具，行政效率高的人比什么都不会的人值钱"], summary: "行政管理的实话：大部分毕业生做的工作根本不需要大学四年——AI让这个事实更加残酷了。" },
    { id: "tourism-mgmt", name: "旅游管理", category: "management", aiExposure: 5.5, radar: { automationRisk: 5, demandGrowth: 4, salaryPotential: 3, entryBarrier: 3, aiCollaboration: 5 }, replacing: ["旅游行程的规划和推荐", "酒店和机票的预订和比价", "景区导览讲解的标准化内容"], notReplacing: ["高端定制旅行的个性化服务", "旅游目的地的危机管理和现场协调", "文旅项目的策划和在地文化挖掘"], demandTrend: "在线旅游平台+AI行程规划工具正在消灭传统旅行社。导游证含金量下降，低端团队游萎缩。高端定制游和文旅策划有小幅增长，但总体就业环境不好。", directions: ["往文旅策划和目的地运营方向走，别做传统旅行社", "学数字营销，旅游+内容创作比纯旅游管理有价值", "考虑酒店管理方向，国际连锁酒店管培生是相对体面的出路"], summary: "AI旅行助手让'帮人订机票酒店'变得毫无价值——旅游管理需要找到AI做不了的体验价值，但大部分课程还在教过时的东西。" },
    { id: "logistics-mgmt", name: "物流管理", category: "management", aiExposure: 6.5, radar: { automationRisk: 7, demandGrowth: 5, salaryPotential: 5, entryBarrier: 4, aiCollaboration: 7 }, replacing: ["仓储库存的智能调度和优化", "运输路线的规划和成本计算", "订单处理和物流单据的自动生成"], notReplacing: ["供应链突发事件的应急决策", "大客户的物流解决方案设计和商务谈判", "跨境物流中的海关和政策合规"], demandTrend: "物流自动化和智能仓储加速渗透，传统仓管和调度岗位快速被替代。但供应链管理人才需求上升，特别是跨境电商物流方向。两极分化严重。", directions: ["往供应链管理方向升级，学数据分析和系统优化", "跨境物流是增量方向，学外贸+物流更有竞争力", "了解智能仓储和自动化设备，做物流科技而非传统物流"], summary: "AI正在让物流变成'无人'行业——还需要人的部分是供应链策略和客户服务，不是搬箱子和填单子。" },
    { id: "ecommerce", name: "电子商务", category: "management", aiExposure: 7.0, radar: { automationRisk: 7, demandGrowth: 5, salaryPotential: 5, entryBarrier: 3, aiCollaboration: 8 }, replacing: ["商品详情页文案和主图的批量生成", "客服聊天机器人的标准化应答", "店铺数据的日常监控和报表生成"], notReplacing: ["爆款选品的市场嗅觉和趋势判断", "直播带货中的临场表现和人设运营", "平台规则变化下的运营策略调整"], demandTrend: "国内电商已经是红海，AI工具让开店门槛更低，竞争更激烈。传统电商运营岗薪资天花板低。跨境电商和直播电商是仅存的增长方向。", directions: ["跨境电商方向还有增量，学好英语或小语种", "直播电商需要个人魅力和销售能力，不是所有人适合", "学AI工具提升效率，用技术做出差异化"], summary: "电子商务专业的尴尬：行业确实很大，但做的事情AI越来越能做，而且不需要这个专业也能入行。" },
    { id: "hr-mgmt", name: "人力资源管理", category: "management", aiExposure: 6.0, radar: { automationRisk: 6, demandGrowth: 4, salaryPotential: 5, entryBarrier: 4, aiCollaboration: 6 }, replacing: ["简历筛选和初步候选人匹配", "薪酬核算和考勤统计", "员工入离职手续的流程化处理"], notReplacing: ["面试中的综合判断和文化适配评估", "组织架构调整和人才发展战略", "劳动纠纷处理和员工关系维护"], demandTrend: "事务性HR岗位正在被AI和SaaS系统取代。招聘、薪酬模块自动化程度最高。HRBP和组织发展方向需求稳定但要求高。整体岗位在缩减但不会消失。", directions: ["往HRBP方向走，做业务伙伴而不是事务性HR", "学劳动法，劳动关系方向需要专业判断力", "掌握HR SaaS工具和数据分析，做数字化HR"], summary: "HR的'算工资、筛简历'部分AI全能做——未来的HR必须是能做组织诊断和人才战略的人，不是发工资条的人。" },

    // ===== 艺术学（续） =====
    { id: "env-design", name: "环境设计", category: "art", aiExposure: 6.5, radar: { automationRisk: 6, demandGrowth: 3, salaryPotential: 5, entryBarrier: 5, aiCollaboration: 7 }, replacing: ["效果图和3D渲染的快速生成", "标准化空间布局的方案推荐", "材料选择和成本估算的初步方案"], notReplacing: ["现场勘查和空间体验的直觉判断", "客户沟通中的需求理解和审美引导", "施工现场的问题协调和方案调整"], demandTrend: "房地产下行直接冲击了最大的就业方向——室内设计和景观设计。AI渲染工具进一步压缩了效果图制作岗的需求。存量房改造和商业空间设计是残存的增长点。", directions: ["别做纯效果图，往空间策划和体验设计方向走", "商业空间设计比住宅设计更抗周期", "学会用AI渲染工具提升效率，但核心能力是现场和客户管理"], summary: "房地产暴雷+AI渲染双杀——环境设计的黄金时代已经过去，现在拼的是项目管理能力而不是画图能力。" },

    { id: "music-performance", name: "音乐表演", category: "art", aiExposure: 3.5, radar: { automationRisk: 2, demandGrowth: 3, salaryPotential: 4, entryBarrier: 7, aiCollaboration: 3 }, replacing: ["伴奏音轨的生成和编排", "基础音乐教学中的视唱练耳训练", "商业背景音乐的创作和编曲"], notReplacing: ["现场演出的即兴表现力和情感传递", "音乐教学中的个性化指导和示范", "高端演出的艺术诠释和舞台魅力"], demandTrend: "AI冲击不大，因为现场表演的价值在于'人在场'。但音乐行业本身就就业困难，大部分毕业生做音乐老师或转行。线上音乐教育内卷严重，线下培训机构洗牌。", directions: ["音乐教学是最稳定的出路，考教师资格证进学校", "如果走演出路线，建立个人品牌比进团更重要", "学音乐制作和音频技术，增加就业面"], summary: "AI不会取代在舞台上演奏的人——但这个专业的真正问题不是AI，是从来就不好就业。" },

function getChinaExposure(major) {
  const adj = CHINA_ADJ[major.id];
  const mod = adj ? adj.mod : 0;
  return Math.round(Math.max(0, Math.min(10, major.aiExposure + mod)) * 10) / 10;
}

function getChinaReason(major) {
  const adj = CHINA_ADJ[major.id];
  return adj ? adj.reason : '';
}

// ===== STATE =====
let currentView = 'home';
let currentCategory = 'all';
let chartInstances = [];

// ===== UTILITY =====
function getExposureColor(score) {
  if (score <= 3) return '#22c55e';
  if (score <= 5) return '#84cc16';
  if (score <= 7) return '#eab308';
  if (score <= 8.5) return '#f97316';
  return '#ef4444';
}

function getExposureLabel(score) {
  if (score <= 3) return '低暴露';
  if (score <= 5) return '中低暴露';
  if (score <= 7) return '中等暴露';
  if (score <= 8.5) return '高暴露';
  return '极高暴露';
}

function disposeCharts() {
  chartInstances.forEach(c => c.dispose());
  chartInstances = [];
}

function renderCategoryTabs() {
  const container = document.getElementById('cat-tabs');
  container.innerHTML = `<button class="tab-btn ${currentCategory === 'all' ? 'tab-active' : ''} px-4 py-2 text-sm whitespace-nowrap text-gray-600 hover:text-gray-900" data-cat="all" onclick="filterCategory('all', this)">全部</button>`;
  DATA.categories.forEach(cat => {
    const count = DATA.majors.filter(m => m.category === cat.id).length;
    container.innerHTML += `<button class="tab-btn ${currentCategory === cat.id ? 'tab-active' : ''} px-4 py-2 text-sm whitespace-nowrap text-gray-600 hover:text-gray-900" data-cat="${cat.id}" onclick="filterCategory('${cat.id}', this)">${cat.name}<span class="ml-1 text-xs text-gray-400">${count}</span></button>`;
  });
}

function filterCategory(catId, btn) {
  currentCategory = catId;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('tab-active'));
  if (btn) btn.classList.add('tab-active');
  filterMajors();
}

function filterMajors() {
  const search = document.getElementById('search-input').value.trim().toLowerCase();
  const grid = document.getElementById('major-grid');
  const filtered = DATA.majors.filter(m => {
    const catMatch = currentCategory === 'all' || m.category === currentCategory;
    const searchMatch = !search || m.name.toLowerCase().includes(search);
    return catMatch && searchMatch;
  }).sort((a, b) => getChinaExposure(b) - getChinaExposure(a));
  grid.innerHTML = filtered.map(m => {
    const chinaExp = getChinaExposure(m);
    const color = getExposureColor(chinaExp);
    const label = getExposureLabel(chinaExp);
    const catName = DATA.categories.find(c => c.id === m.category)?.name || '';
    const pct = (chinaExp / 10) * 100;

    return `

function toggleCompare() {

  currentView = 'compare';
  document.getElementById('home-view').classList.add('hidden');
  document.getElementById('detail-view').classList.add('hidden');
  document.getElementById('compare-view').classList.remove('hidden');
  document.getElementById('compare-btn').classList.add('bg-blue-600', 'text-white', 'border-blue-600');
  document.getElementById('compare-btn').classList.remove('hover:bg-gray-100');
  window.scrollTo(0, 0);

  // Populate selects
  ['compare-a', 'compare-b'].forEach(selId => {
    const sel = document.getElementById(selId);
    sel.innerHTML = '<option value="">选择专业</option>';
    DATA.categories.forEach(cat => {
      const majors = DATA.majors.filter(m => m.category === cat.id);
      if (majors.length === 0) return;
      const group = document.createElement('optgroup');
      group.label = cat.name;
      majors.forEach(m => {
        const opt = document.createElement('option');
        opt.value = m.id;
        opt.textContent = m.name;
        group.appendChild(opt);
      });
      sel.appendChild(group);
    });
  });
  document.getElementById('compare-content').innerHTML = '<p class="text-center text-gray-400 py-12">请选择两个专业进行对比</p>';
}

        { value: [b.radar.automationRisk, b.radar.demandGrowth, b.radar.salaryPotential, b.radar.entryBarrier, b.radar.aiCollaboration], name: b.name, areaStyle: { color: colorB + '25' }, lineStyle: { color: colorB, width: 2 }, itemStyle: { color: colorB } }
      ]
    }]
  });
}

// ===== NAVIGATION =====
function showHome() {
  disposeCharts();
  currentView = 'home';
  document.getElementById('home-view').classList.remove('hidden');
  document.getElementById('detail-view').classList.add('hidden');
  document.getElementById('compare-view').classList.add('hidden');
  document.getElementById('compare-btn').classList.remove('bg-blue-600', 'text-white', 'border-blue-600');
  document.getElementById('compare-btn').classList.add('hover:bg-gray-100');
  window.scrollTo(0, 0);
}

// ===== RESPONSIVE CHARTS =====
window.addEventListener('resize', () => {
  chartInstances.forEach(c => c.resize());
});

// ===== INIT =====
renderCategoryTabs();
filterMajors();
</script>
